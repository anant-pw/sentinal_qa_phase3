name: Sentinel-QA Autonomous Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./sentinel.db
      SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      JIRA_URL: ${{ secrets.JIRA_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
      JIRA_ISSUE_TYPE: ${{ secrets.JIRA_ISSUE_TYPE }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Start Sentinel API
        run: |
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          timeout 30s bash -c 'until curl -s localhost:8000/plans; do sleep 2; done'

      - name: Hydrate DB
        run: python -m scripts.migrate_yamls

      - name: Run Sentinel-QA
        run: pytest tests/test_engine.py

      - name: Archive Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-evidence
          path: |
            allure-results/
            *.png